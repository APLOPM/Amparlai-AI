name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

jobs:
  lint_typecheck_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (frontend)
        run: |
          if [ -f package-lock.json ]; then npm ci; else echo "No package-lock.json found, skipping npm ci"; fi

      - name: ESLint
        run: |
          if [ -f package.json ] && npm run | grep -q " lint"; then npm run lint; else echo "No lint script found, skipping"; fi

      - name: TypeScript check
        run: |
          if [ -f package.json ] && npm run | grep -q " type-check"; then npm run type-check; else echo "No type-check script found, skipping"; fi

      - name: Prettier check
        run: |
          if [ -f package.json ] && npm run | grep -q " format:check"; then npm run format:check; else echo "No format:check script found, skipping"; fi

      - name: Frontend tests
        run: |
          if [ -f package.json ] && npm run | grep -q " test"; then npm test -- --ci; else echo "No test script found, skipping"; fi

      - name: Backend tests
        run: |
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt pytest && pytest; else echo "No requirements.txt found, skipping backend tests"; fi

  security_scan:
    runs-on: ubuntu-latest
    needs: lint_typecheck_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit
        run: |
          if [ -f package-lock.json ]; then npm audit --audit-level=high; else echo "No package-lock.json found, skipping npm audit"; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit
        run: |
          if [ -f requirements.txt ]; then python -m pip install pip-audit && pip-audit -r requirements.txt; else echo "No requirements.txt found, skipping pip-audit"; fi
