name: CI-CD Pipeline (Monorepo Auto-Detect)

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      package_manager: ${{ steps.detect.outputs.package_manager }}
      orchestrator: ${{ steps.detect.outputs.orchestrator }}
      workspaces: ${{ steps.detect.outputs.workspaces }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          HAS_NODE="false"
          PM="npm"
          ORCHESTRATOR="none"

          if [ -f package.json ] || [ -f nx.json ] || [ -f turbo.json ] || [ -d apps ] || [ -d packages ] || [ -d services ]; then
            HAS_NODE="true"
          fi

          if [ -f pnpm-lock.yaml ]; then PM="pnpm"; fi
          if [ -f yarn.lock ]; then PM="yarn"; fi
          if [ -f package-lock.json ]; then PM="npm"; fi

          if [ -f nx.json ]; then
            ORCHESTRATOR="nx"
          elif [ -f turbo.json ]; then
            ORCHESTRATOR="turbo"
          fi

          mapfile -t WS < <(find apps packages services -mindepth 1 -maxdepth 2 -name package.json -print 2>/dev/null | sed 's#/package.json##' | sort -u)
          if [ -f package.json ]; then WS=("." "${WS[@]}"); fi

          if [ ${#WS[@]} -eq 0 ]; then
            WORKSPACES='["."]'
          else
            WORKSPACES=$(printf '%s\n' "${WS[@]}" | jq -R -s -c 'split("\n") | map(select(length>0))')
          fi

          echo "has_node=$HAS_NODE" >> "$GITHUB_OUTPUT"
          echo "package_manager=$PM" >> "$GITHUB_OUTPUT"
          echo "orchestrator=$ORCHESTRATOR" >> "$GITHUB_OUTPUT"
          echo "workspaces=$WORKSPACES" >> "$GITHUB_OUTPUT"

  test_build:
    name: Test & Build (${{ matrix.environment }})
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    env:
      APP_ENV: ${{ matrix.environment }}
      ORCHESTRATOR: ${{ needs.detect.outputs.orchestrator }}
      PM: ${{ needs.detect.outputs.package_manager }}
      WORKSPACES: ${{ needs.detect.outputs.workspaces }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ needs.detect.outputs.package_manager }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          case "$PM" in
            pnpm)
              corepack enable
              pnpm install --frozen-lockfile || pnpm install
              ;;
            yarn)
              corepack enable
              yarn install --immutable || yarn install
              ;;
            npm)
              if [ -f package-lock.json ]; then npm ci; else npm install; fi
              ;;
          esac

      - name: Execute pipeline (supports Nx/Turborepo/workspaces)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$ORCHESTRATOR" = "nx" ]; then
            npx nx run-many -t lint,test,build --configuration="$APP_ENV" --all --parallel=3
            exit 0
          fi

          if [ "$ORCHESTRATOR" = "turbo" ]; then
            npx turbo run lint test build --continue --summarize
            exit 0
          fi

          echo "$WORKSPACES" | jq -r '.[]' | while read -r ws; do
            if [ "$ws" = "." ]; then
              npm run lint --if-present
              npm run test --if-present
              npm run build --if-present
            else
              npm --prefix "$ws" run lint --if-present
              npm --prefix "$ws" run test --if-present
              npm --prefix "$ws" run build --if-present
            fi
          done

  deploy_k8s:
    name: Deploy Kubernetes (staging/prod)
    needs: test_build
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: staging
            ref: refs/heads/staging
          - environment: prod
            ref: refs/heads/main
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        if: github.ref == matrix.ref
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: github.ref == matrix.ref && secrets.KUBE_CONFIG_DATA != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply manifests
        if: github.ref == matrix.ref && secrets.KUBE_CONFIG_DATA != ''
        run: kubectl apply -f k8s/
