name: Monorepo CD

on:
  push:
    branches: [dev, staging, main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          HAS_NODE="false"
          if [ -f package.json ] || [ -f nx.json ] || [ -f turbo.json ] || [ -d apps ] || [ -d packages ]; then HAS_NODE="true"; fi
          echo "has_node=$HAS_NODE" >> "$GITHUB_OUTPUT"

  build_and_publish:
    name: Build & Publish (${{ matrix.environment }})
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            branch: refs/heads/dev
            tag: dev
          - environment: staging
            branch: refs/heads/staging
            tag: staging
          - environment: prod
            branch: refs/heads/main
            tag: prod
    env:
      APP_ENV: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == matrix.branch || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image(s)
        if: github.ref == matrix.branch || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_BASE="${REGISTRY}/${GITHUB_REPOSITORY}"
          VERSION_TAG="${GITHUB_SHA}"
          ENV_TAG="${{ matrix.tag }}"

          if [ -f Dockerfile ]; then
            docker build -t "$IMAGE_BASE:$VERSION_TAG" -t "$IMAGE_BASE:$ENV_TAG" .
            docker push "$IMAGE_BASE:$VERSION_TAG"
            docker push "$IMAGE_BASE:$ENV_TAG"
            exit 0
          fi

          if [ -f Dockerfile.frontend ] || [ -f Dockerfile.backend ]; then
            if [ -f Dockerfile.frontend ]; then
              docker build -f Dockerfile.frontend -t "$IMAGE_BASE/frontend:$VERSION_TAG" -t "$IMAGE_BASE/frontend:$ENV_TAG" .
              docker push "$IMAGE_BASE/frontend:$VERSION_TAG"
              docker push "$IMAGE_BASE/frontend:$ENV_TAG"
            fi

            if [ -f Dockerfile.backend ]; then
              docker build -f Dockerfile.backend -t "$IMAGE_BASE/backend:$VERSION_TAG" -t "$IMAGE_BASE/backend:$ENV_TAG" .
              docker push "$IMAGE_BASE/backend:$VERSION_TAG"
              docker push "$IMAGE_BASE/backend:$ENV_TAG"
            fi
            exit 0
          fi

          echo "No Dockerfile detected, skipping publish step."
